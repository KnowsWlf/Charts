name: Release Helm Charts

# Trigger on push to main when any chart changes. Lints and packages every
# chart under charts/, publishes a GitHub Release per chart version, and
# (re)builds the merged Helm repo index on the gh-pages branch.
on:
  push:
    branches:
      - main
    paths:
      - 'charts/**'
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Lint and package all charts
        run: |
          mkdir -p .charts
          for chart in charts/*/; do
            [ -f "${chart}Chart.yaml" ] || continue
            echo "==> Linting and packaging ${chart}"
            helm lint "$chart"
            helm package "$chart" -d .charts/
          done

      - name: Create GitHub Releases (one per chart, idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for chart in charts/*/; do
            [ -f "${chart}Chart.yaml" ] || continue
            name=$(grep '^name:' "${chart}Chart.yaml" | awk '{print $2}' | tr -d '"')
            version=$(grep '^version:' "${chart}Chart.yaml" | awk '{print $2}' | tr -d '"')
            tag="${name}-v${version}"
            if gh release view "$tag" >/dev/null 2>&1; then
              echo "Release $tag already exists, skipping."
            else
              echo "Creating release $tag..."
              gh release create "$tag" ".charts/${name}-${version}.tgz" \
                --title "${name} v${version}" --generate-notes
            fi
          done

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Publish to GitHub Pages (Helm repo)
        run: |
          # Clone gh-pages or create it
          if git fetch origin gh-pages 2>/dev/null; then
            git checkout gh-pages
            git pull origin gh-pages --ff-only || true
          else
            git checkout --orphan gh-pages
            git rm -rf . || true
          fi

          # Copy packaged charts and (re)build the merged index across all charts
          mkdir -p charts
          cp .charts/*.tgz charts/

          REPO_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}/charts"
          if [ -f index.yaml ]; then
            helm repo index charts/ --merge index.yaml --url "$REPO_URL"
          else
            helm repo index charts/ --url "$REPO_URL"
          fi

          # Keep a copy at root for gh-pages compatibility
          cp charts/index.yaml index.yaml

          # Commit and push gh-pages
          git add charts/ index.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Publish charts"
            git push origin gh-pages
          fi
