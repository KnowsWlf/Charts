{{- $ctx := . -}}
{{- if .Values.traefik.enabled }}
{{- range .Values.registries }}
{{- $name := include "docker-proxy.registryName" (dict "ctx" $ctx "reg" .) }}
{{- $host := include "docker-proxy.registryHost" (dict "ctx" $ctx "reg" .) }}
{{- if $ctx.Values.traefik.redirectToHttps }}
---
# HTTP → HTTPS redirect middleware
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ $name }}-redirect
  labels:
    {{- include "docker-proxy.registryLabels" (dict "ctx" $ctx "reg" .) | nindent 4 }}
spec:
  redirectScheme:
    permanent: true
    scheme: https
{{- end }}
---
# HTTP entry
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ $name }}-web
  labels:
    {{- include "docker-proxy.registryLabels" (dict "ctx" $ctx "reg" .) | nindent 4 }}
spec:
  entryPoints:
    - {{ $ctx.Values.traefik.httpEntryPoint }}
  routes:
    - kind: Rule
      match: Host(`{{ $host }}`)
      services:
        - name: {{ $name }}
          port: {{ $ctx.Values.service.port }}
      {{- if $ctx.Values.traefik.redirectToHttps }}
      middlewares:
        - name: {{ $name }}-redirect
      {{- end }}
---
# HTTPS entry
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ $name }}-websecure
  labels:
    {{- include "docker-proxy.registryLabels" (dict "ctx" $ctx "reg" .) | nindent 4 }}
spec:
  entryPoints:
    - {{ $ctx.Values.traefik.httpsEntryPoint }}
  routes:
    - kind: Rule
      match: Host(`{{ $host }}`)
      services:
        - name: {{ $name }}
          port: {{ $ctx.Values.service.port }}
  {{- if $ctx.Values.traefik.tlsSecretName }}
  tls:
    secretName: {{ $ctx.Values.traefik.tlsSecretName | quote }}
  {{- end }}
{{- end }}
{{- end }}
