{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) }}
{{- /* Lookup existing secret to preserve auto-generated keys across upgrades */}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace (include "hermes.secretName" .) }}
{{- /* Auto-generate API_SERVER_KEY if not set */}}
{{- $apiServerKey := .Values.secrets.apiServerKey -}}
{{- if not $apiServerKey -}}
  {{- if $existing -}}
    {{- $apiServerKey = index $existing.data "API_SERVER_KEY" | b64dec -}}
  {{- else -}}
    {{- $apiServerKey = randAlphaNum 32 -}}
  {{- end -}}
{{- end -}}
{{- /* Auto-generate AUTH_TOKEN if not set */}}
{{- $webuiAuthToken := .Values.secrets.webuiAuthToken -}}
{{- if not $webuiAuthToken -}}
  {{- if $existing -}}
    {{- $webuiAuthToken = index $existing.data "AUTH_TOKEN" | b64dec -}}
  {{- else -}}
    {{- $webuiAuthToken = randAlphaNum 32 -}}
  {{- end -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hermes.secretName" . }}
  labels:
    {{- include "hermes.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
    {{- with .Values.secrets.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
type: Opaque
stringData:
  {{- if .Values.secrets.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.telegramBotToken }}
  TELEGRAM_BOT_TOKEN: {{ .Values.secrets.telegramBotToken | quote }}
  {{- end }}
  API_SERVER_KEY: {{ $apiServerKey | quote }}
  {{- if $webuiAuthToken }}
  AUTH_TOKEN: {{ $webuiAuthToken | quote }}
  {{- end }}
{{- end }}

